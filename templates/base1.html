<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <nav>
        <div>
            <a href="{{ url_for('index') }}"><button class="btn"><img alt="Вернуться на главную страницу" id="b34" src="{{ url_for('static', filename='images/house.svg') }}">Главная</button></a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!--Модалка-->
    <div id="modal" class="modal">
      <div class="modal-content">
        <p id="modal-message"></p>
        <div class="modal-actions">
            <!--
            <a id="yes-a" href=""><button >Да</button></a>
            <a id="no-a" href=""><button id="no-btn">Нет</button></a>
            -->
            <button id="yes-a" type="button">Да</button>
            <button id="no-btn" type="button">Нет</button>
        </div>
      </div>
    </div>
</body>
</html>
